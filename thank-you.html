<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You - Viral Clip Method</title>
  <style>
    :root {
      --ink: #10140f;
      --deep: #163300;
      --green: #9fe870;
      --cream: #f7f4ea;
      --paper: #ffffff;
      --muted: #5d6659;
      --line: rgba(16, 20, 15, 0.14);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 80% 10%, rgba(159, 232, 112, 0.5), transparent 34%),
        var(--cream);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 54px);
      border-radius: var(--radius);
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 50px rgba(16, 20, 15, 0.12);
    }

    .badge {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--green);
      color: var(--deep);
      font-weight: 900;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.6rem, 8vw, 5rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 650;
      line-height: 1.5;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--paper);
      font-weight: 900;
      text-decoration: none;
    }

    .note {
      margin-top: 18px;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Payment received</div>
    <h1>Your guide is ready.</h1>
    <p>Open the AI Brainrot Step-by-Step guide below. This is the Notion course access page placeholder for Viral Clip Method.</p>
    <a class="button" href="https://www.notion.so/viralclipmethod/AI-Brainrot-Step-by-Step-Guide" target="_blank" rel="noopener">Open Notion Guide</a>
    <p class="note">Bookmark this page so you can come back to your course access link.</p>
  </main>
</body>
</html>
